{% extends "base.html" %}
{% block title %}404 — Page Not Found{% endblock %}

{% block content %}
<div class="error-page">
  <div class="error-code">404</div>
  <h2 style="font-family:var(--font-head);font-size:1.5rem;margin-top:1rem">Page Not Found</h2>
  <p class="text-muted" style="max-width:400px;margin:1rem auto">
    Looks like this parking spot doesn't exist. Let's get you back on track.
  </p>
  <div class="flex gap-2" style="margin-top:1.5rem;justify-content:center;flex-wrap:wrap">
    <a href="{{ url_for('home') }}" class="btn btn-primary">🏠 Go Home</a>
    <a href="{{ url_for('slots') }}" class="btn btn-outline">View Parking Map</a>
  </div>
</div>
{% endblock %}
